<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="420" fill="#0a1626"/>
  <text x="500" y="50" fill="#ffffff" font-size="30" font-weight="bold" text-anchor="middle">De ChatGPT (2022) a la IA local madura (2026)</text>

  <line x1="80" y1="210" x2="920" y2="210" stroke="#33506e" stroke-width="4"/>

  <!-- hitos -->
  <g text-anchor="middle">
    <circle cx="160" cy="210" r="12" fill="#3b82f6"/>
    <text x="160" y="150" fill="#5fb3ff" font-size="24" font-weight="bold">2022</text>
    <text x="160" y="260" fill="#cfe3ff" font-size="16">ChatGPT</text>
    <text x="160" y="282" fill="#cfe3ff" font-size="16">populariza los LLM</text>

    <circle cx="390" cy="210" r="12" fill="#3b82f6"/>
    <text x="390" y="150" fill="#5fb3ff" font-size="24" font-weight="bold">2023-24</text>
    <text x="390" y="260" fill="#cfe3ff" font-size="16">Llama + open-weight</text>
    <text x="390" y="282" fill="#cfe3ff" font-size="16">llama.cpp · GGUF · cuantización</text>

    <circle cx="620" cy="210" r="12" fill="#f59e0b"/>
    <text x="620" y="150" fill="#ffd27a" font-size="24" font-weight="bold">2025</text>
    <text x="620" y="260" fill="#ffe6b3" font-size="16">Agentes de código (RLVR)</text>
    <text x="620" y="282" fill="#ffe6b3" font-size="16">de experimento a "daily driver"</text>

    <circle cx="850" cy="210" r="12" fill="#22c55e"/>
    <text x="850" y="150" fill="#86efac" font-size="24" font-weight="bold">2026</text>
    <text x="850" y="260" fill="#bbf7d0" font-size="16">Modelos abiertos potentes</text>
    <text x="850" y="282" fill="#bbf7d0" font-size="16">en hardware de consumo</text>
  </g>
</svg>
