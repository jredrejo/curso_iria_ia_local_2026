<svg xmlns="http://www.w3.org/2000/svg" width="760" height="540" viewBox="0 0 760 540" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="540" fill="#0a1626"/>
  <text x="380" y="48" fill="#ffffff" font-size="28" font-weight="bold" text-anchor="middle">El bucle del agente de código</text>

  <defs>
    <marker id="a" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <g text-anchor="middle" font-size="18">
    <rect x="300" y="100" width="160" height="70" rx="12" fill="#3b82f6"/>
    <text x="380" y="142" fill="#fff">Planificar</text>

    <rect x="540" y="240" width="160" height="70" rx="12" fill="#6366f1"/>
    <text x="620" y="282" fill="#fff">Editar código</text>

    <rect x="300" y="380" width="160" height="70" rx="12" fill="#8b5cf6"/>
    <text x="380" y="415" fill="#fff">Ejecutar /</text>
    <text x="380" y="437" fill="#fff">correr tests</text>

    <rect x="60" y="240" width="160" height="70" rx="12" fill="#22c55e"/>
    <text x="140" y="282" fill="#06210f">Verificar</text>
  </g>

  <g stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#a)">
    <path d="M460,135 C540,160 560,200 600,236"/>
    <path d="M600,310 C560,350 520,365 462,400"/>
    <path d="M300,420 C220,400 195,360 162,312"/>
    <path d="M140,240 C160,200 215,165 298,140"/>
  </g>

  <text x="380" y="300" fill="#9bb4d0" font-size="16" text-anchor="middle">repite hasta</text>
  <text x="380" y="322" fill="#9bb4d0" font-size="16" text-anchor="middle">cumplir el objetivo</text>

  <text x="380" y="510" fill="#5fb3ff" font-size="16" text-anchor="middle">Viable desde 2025 con RLVR (Reinforcement Learning from Verifiable Rewards)</text>
</svg>
