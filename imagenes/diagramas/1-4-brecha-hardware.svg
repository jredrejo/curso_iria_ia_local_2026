<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="520" fill="#0a1626"/>
  <text x="450" y="50" fill="#ffffff" font-size="30" font-weight="bold" text-anchor="middle">La brecha de 600× (20 años de GPUs)</text>
  <text x="450" y="82" fill="#5fb3ff" font-size="18" text-anchor="middle">El cuello de botella ya no es el cómputo, es la memoria</text>

  <!-- eje -->
  <line x1="120" y1="120" x2="120" y2="430" stroke="#33506e" stroke-width="2"/>
  <line x1="120" y1="430" x2="820" y2="430" stroke="#33506e" stroke-width="2"/>

  <!-- barra computo -->
  <rect x="240" y="130" width="160" height="300" fill="#3b82f6"/>
  <text x="320" y="115" fill="#ffffff" font-size="26" font-weight="bold" text-anchor="middle">60.000×</text>
  <text x="320" y="460" fill="#cfe3ff" font-size="20" text-anchor="middle">Cómputo (GPU)</text>

  <!-- barra ancho de banda -->
  <rect x="540" y="424" width="160" height="6" fill="#f59e0b"/>
  <text x="620" y="410" fill="#ffffff" font-size="26" font-weight="bold" text-anchor="middle">100×</text>
  <text x="620" y="460" fill="#ffe6b3" font-size="20" text-anchor="middle">Ancho de banda</text>

  <text x="450" y="500" fill="#9bb4d0" font-size="16" text-anchor="middle">Crecimiento relativo en ~20 años · ratio ≈ 600×</text>
</svg>
